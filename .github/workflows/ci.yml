name: CI

on:
  push:
    branches: [main, "agent/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python scripts/check_supply_chain_policy.py --online
      - run: python scripts/check_public_language.py
      - run: python scripts/check_docs.py
      - run: python scripts/audit_public_tree.py
      - run: >-
          python -m pip install --require-hashes --only-binary=:all:
          -r requirements/build.lock
      - run: python -c "import os; open(os.environ['GITHUB_ENV'], 'a').write('PIP_NO_INDEX=1\nPIP_DISABLE_PIP_VERSION_CHECK=1\n')"
      - run: python -m pip install --no-deps --no-build-isolation -e .
      - run: python -m unittest discover -s tests -v
      - run: python -m ruff check src tests scripts
      - run: python -m build --no-isolation
      - run: python scripts/verify_release.py dist
      - run: python scripts/package_components.py --output dist-components
      - if: runner.os != 'Windows'
        run: |
          sh -n scripts/lifecycle/install.sh
          sh -n scripts/lifecycle/uninstall.sh
          sh -n scripts/lifecycle/context-normalizer-runtime.sh
          sh -n integrations/codex/install.sh
          sh -n integrations/codex/uninstall.sh
          sh -n integrations/codex/verify.sh
          sh -n integrations/pi/install.sh
          sh -n integrations/pi/uninstall.sh
          sh -n integrations/pi/verify.sh
      - if: runner.os == 'Windows'
        shell: powershell
        run: |
          $errors = @()
          Get-ChildItem -Recurse -Filter *.ps1 | ForEach-Object {
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$errors) | Out-Null
          }
          if ($errors.Count) { $errors | Format-List; exit 1 }

  pi-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: node integrations/pi/test/context-normalizer.test.mjs

  windows-lifecycle:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - shell: powershell
        run: .\scripts\acceptance-windows.ps1
