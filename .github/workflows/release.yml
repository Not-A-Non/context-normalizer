name: Release artifacts

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SOURCE_DATE_EPOCH: "315532800"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - run: python scripts/check_supply_chain_policy.py --online
      - run: python scripts/check_public_language.py
      - run: python scripts/check_docs.py
      - run: python scripts/audit_public_tree.py
      - run: >-
          python -m pip install --require-hashes --only-binary=:all:
          -r requirements/build.lock
      - run: echo "PIP_NO_INDEX=1" >> "$GITHUB_ENV" && echo "PIP_DISABLE_PIP_VERSION_CHECK=1" >> "$GITHUB_ENV"
      - name: Verify tag and package version
        run: |
          version=$(PYTHONPATH=src python -c "from context_normalizer import __version__; print(__version__)")
          test "v$version" = "$GITHUB_REF_NAME"
      - run: PYTHONPATH=src python -m unittest discover -s tests -v
      - run: python -m ruff check src tests scripts
      - run: python -m build --no-isolation
      - run: python scripts/verify_release.py dist
      - run: node integrations/pi/test/context-normalizer.test.mjs
      - run: python scripts/package_components.py --output dist
      - run: cd dist && sha256sum * > SHA256SUMS.txt
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: "dist/*"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
