name: Bug report
description: Report a reproducible Context Normalizer defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include private prompts, secrets, or full client configuration.
  - type: input
    id: version
    attributes:
      label: Context Normalizer version
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: OS, Python, and client versions
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
